name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_DATABASE: python_sandbox
          MARIADB_USER: sandbox
          MARIADB_PASSWORD: sandbox
          MARIADB_ROOT_PASSWORD: sandbox-root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="healthcheck.sh --connect --innodb_initialized"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
          --health-start-period=10s

    env:
      SANDBOX_TEST_DATABASE_URL: mysql://sandbox:sandbox@127.0.0.1:3306/python_sandbox

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: dtolnay/rust-toolchain@stable

      - name: Frontend tests
        run: |
          npm ci --prefix frontend
          npm --prefix frontend test

      - name: Backend tests
        run: cargo test --manifest-path backend/Cargo.toml
